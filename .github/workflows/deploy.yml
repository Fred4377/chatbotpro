name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chatbotpro-frontend/package-lock.json

      - name: Install and Build 🔧
        run: |
          cd chatbotpro-frontend
          npm ci
          npm run build

      - name: Add .nojekyll file 📄
        run: touch chatbotpro-frontend/dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: chatbotpro-frontend/dist
          branch: gh-pages
